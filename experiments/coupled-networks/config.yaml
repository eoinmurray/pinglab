plotting:
  raster:
    start_time: 400.0
    stop_time: 1000.0

default_inputs:
  I_E: 1.2
  I_I: 0.9
  noise: 0.4

phase:
  signal: g_i_mean_E
  rate_bin_ms: 2.0
  smoothing_ms: 5.0

projection:
  num_fibers: 200
  targets_per_fiber: 80
  weight: 0.6
  seed: 1

packet:
  times:
    start: 500.0
    stop: 900.0
    num: 10
  delays_ms:
    start: 0.0
    stop: 25.0
    num: 13
  width_ms: 3.0
  mean_spikes_per_fiber: 1.0
  jitter_ms: [0.0, 1.0, 2.0, 5.0]
  trials_per_condition: 10
  seed: 2

readout:
  window_ms: 20.0
  baseline_ms: 20.0

base:
  instruments:
    variables:
      - V
      - g_e
      - g_i
    population_means: true
    downsample: 1

  seed: 1

  # Network
  dt: 0.1
  T: 1200.0
  N_E: 800
  N_I: 200

  # Synaptic weights: Balanced E-I for PING
  g_ei: 1.5
  g_ie: 2.5
  g_ee: 0.3
  g_ii: 0.3

  # Connection probabilities
  p_ee: 0.04
  p_ei: 0.12
  p_ie: 0.04
  p_ii: 0.04

  # Delays
  delay_ei: 0.5
  delay_ie: 1.2
  delay_ee: 0.5
  delay_ii: 0.5

  # Synapses
  tau_ampa: 2.0
  tau_gaba: 6.5

  # LIF
  V_init: -65.0
  E_L: -65.0
  E_e: 0.0
  E_i: -80.0
  C_m_E: 1.0
  C_m_I: 1.0
  g_L_E: 0.05
  g_L_I: 0.1
  V_th: -50.0
  V_reset: -65.0
  t_ref_E: 3.0
  t_ref_I: 1.5

  # Heterogeneity
  V_th_heterogeneity_sd: 1.5
  g_L_heterogeneity_sd: 0.15
  C_m_heterogeneity_sd: 0.10
  t_ref_heterogeneity_sd: 0.3

  connectivity_scaling: one_over_N_src
