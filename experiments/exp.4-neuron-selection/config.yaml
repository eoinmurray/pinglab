plotting:
  raster:
    start_time: 200.0
    stop_time: 500.0

default_inputs:
  I_E: 1.0
  I_I: 0.8
  noise: 0.2

sweep:
  I_E:
    start: 0.0
    stop: 3.0
    num: 9
  gif_levels: [0.5, 1.0, 1.5, 2.0, 2.5]
  raster_levels: [0.5, 1.5, 2.5]
  burn_in_ms: 200.0
  bin_ms: 5.0
  gif_frame_duration_s: 0.7

models:
  - name: lif
    neuron_model: lif

  - name: hh
    neuron_model: hh
    overrides:
      E_L: -54.4
      g_L_E: 0.3
      g_L_I: 0.3
      g_Na: 120.0
      g_K: 36.0
      E_Na: 50.0
      E_K: -77.0
      V_th: 0.0

  - name: adex
    neuron_model: adex
    overrides:
      adex_V_T: -50.0
      adex_delta_T: 2.0
      adex_tau_w: 100.0
      adex_a: 2.0
      adex_b: 60.0
      adex_V_peak: 20.0

  - name: connor_stevens
    neuron_model: connor_stevens
    overrides:
      g_A: 47.7
      V_th: 0.0

  - name: fitzhugh
    neuron_model: fitzhugh
    overrides:
      V_init: -1.0
      V_th: 1.0
      fhn_a: 0.7
      fhn_b: 0.8
      fhn_tau_w: 12.5
      dt: 0.05
      T: 300.0
    input_scale_E: 0.5
    input_scale_I: 0.5

  - name: mqif
    neuron_model: mqif
    overrides:
      mqif_a: [1.0]
      mqif_Vr: [-50.0]

  - name: izhikevich
    neuron_model: izhikevich
    overrides:
      V_th: 30.0
      izh_a: 0.02
      izh_b: 0.2
      izh_c: -65.0
      izh_d: 8.0

base:
  dt: 0.1
  T: 500.0
  seed: 0

  N_E: 200
  N_I: 50

  g_ei: 1.5
  g_ie: 2.5
  g_ee: 0.3
  g_ii: 0.3

  p_ee: 0.04
  p_ei: 0.12
  p_ie: 0.04
  p_ii: 0.04

  delay_ei: 0.5
  delay_ie: 1.2
  delay_ee: 0.5
  delay_ii: 0.5

  V_init: -65.0
  E_L: -65.0
  E_e: 0.0
  E_i: -80.0
  C_m_E: 1.0
  g_L_E: 0.05
  C_m_I: 1.0
  g_L_I: 0.1
  V_th: -50.0
  V_reset: -65.0
  t_ref_E: 3.0
  t_ref_I: 1.5

  g_Na: 120.0
  g_K: 36.0
  E_Na: 50.0
  E_K: -77.0

  tau_ampa: 2.0
  tau_gaba: 6.5

  connectivity_scaling: "one_over_N_src"

  V_th_heterogeneity_sd: 1.5
  g_L_heterogeneity_sd: 0.15
  C_m_heterogeneity_sd: 0.10
  t_ref_heterogeneity_sd: 0.3
