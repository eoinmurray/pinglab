# ty type-checker configuration for pinglab.
# Python lives in src/cli, src/notebooks, and the demolab layer (tools/,
# experiments/); artifacts and papers are not type-checked.

[environment]
python-version = "3.10"
# Source roots for first-party import resolution: `cli.*` resolves from src,
# `helpers.*` from src/notebooks, `models`/`config`/etc. from src/cli, and the
# repo root (".") so `tools.snn.tool` resolves as a namespace package.
root = ["src", "src/cli", "src/notebooks", "."]

[src]
exclude = [
    "src/artifacts",
    "src/papers",
    ".venv",
    # Vendored black box (never edited here) + generated output — not our
    # type-checked surface.
    "demolab-engine",
    "artifacts",
    "temp",
]

[terminal]
output-format = "concise"
