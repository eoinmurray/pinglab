# Taskfile for pinglab — https://taskfile.dev  (run `task` to list everything)
#
# Stack: Python via uv (src/cli, src/notebooks); publishing via Typst
# (writings/ + artifacts/, built by demolab-engine). See `task build`/`dev`.
# House rule: everything here runs LOCAL. No task dispatches Modal — that
# spends real money, so it stays an explicit opt-in via a notebook's own
# --modal-gpu flag (e.g. `task nb NB=nb022 -- --modal-gpu A100`), never a task.

version: "3"
silent: true

vars:
  CLI: uv run python src/cli/cli.py

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # ── Setup ───────────────────────────────────────────────────────────────
  install:
    desc: Install all dependencies (Python via uv)
    cmds:
      - uv sync --dev

  # ── Quality gate (mirrors .github/workflows/lint.yml) ───────────────────
  lint:
    desc: Ruff lint over src/cli + src/notebooks
    cmds:
      - uv run ruff check {{.CLI_ARGS}}

  fmt:
    desc: Format Python with ruff
    cmds:
      - uv run ruff format {{.CLI_ARGS}}

  typecheck:
    desc: Type-check with ty
    cmds:
      - uv run ty check

  nb-gate:
    desc: Enforce the notebook→CLI import boundary (no `import cli`/`models`)
    cmds:
      - uv run ruff check src/notebooks --select TID

  check:
    desc: Full quality gate — lint + typecheck + notebook boundary (what CI runs)
    cmds:
      - task: lint
      - task: typecheck
      - task: nb-gate

  # ── Tests (mirrors .github/workflows/test.yml) ──────────────────────────
  test:
    desc: "Pick a scope — use `task test:fast` or `task test:all`"
    cmds:
      - |
        echo "\`task test\` is split by scope — pick one:"
        echo "  task test:fast   (~50s)    lint + typecheck + unit/coverage tests"
        echo "  task test:all    (~3-5m)   lint + typecheck + the full suite incl @slow"
        echo ""
        echo "Both take pass-through args, e.g.  task test:fast -- -k rhythm"

  test:fast:
    desc: Lint + typecheck + the quick tests (skips the two heavy integration files) — ~50s
    cmds:
      # Blank CLI_ARGS for the checks so `task test:fast -- -k foo` reaches pytest only.
      - task: lint
        vars: { CLI_ARGS: "" }
      - task: typecheck
      - >-
        uv run pytest src/cli/tests tools -m "not slow"
        --ignore=src/cli/tests/test_train_integration.py
        --ignore=src/cli/tests/test_infer_integration.py
        {{.CLI_ARGS}}

  test:all:
    desc: Lint + typecheck + the FULL suite incl @slow end-to-end tests — ~3-5m
    cmds:
      - task: lint
        vars: { CLI_ARGS: "" }
      - task: typecheck
      - uv run pytest src/cli/tests tools {{.CLI_ARGS}}

  test:cov:
    desc: Tests with the coverage report (mirrors CI)
    cmds:
      - uv run pytest src/cli/tests --cov --cov-report=term-missing

  # ── CLI (pinglab-cli) ───────────────────────────────────────────────────
  sim:
    desc: "Run a simulation — e.g. task sim -- --t-ms 300 --input-rate 25"
    cmds:
      - "{{.CLI}} sim {{.CLI_ARGS}}"

  train:
    desc: "Train a model — e.g. task train -- --epochs 3 --max-samples 1000"
    cmds:
      - "{{.CLI}} train {{.CLI_ARGS}}"

  cli:
    desc: "Run the CLI with arbitrary args — e.g. task cli -- --help"
    cmds:
      - "{{.CLI}} {{.CLI_ARGS}}"

  # ── Notebooks (the reproduce-a-figure runners) ──────────────────────────
  nb:
    desc: "Run a notebook runner — e.g. task nb NB=nb054 -- --no-wipe-dir"
    requires:
      vars: [NB]
    cmds:
      - uv run python src/notebooks/{{.NB}}.py {{.CLI_ARGS}}

  # ── Publishing (Typst via demolab-engine) ───────────────────────────────
  # `task build` / `task dev` drive the Typst engine over writings/ + artifacts/;
  # `task run` runs a demolab experiment.
  build:
    desc: "Build the Typst bundle → artifacts/site/ (web) + artifacts/pdfs/ (PDFs + book)"
    cmds:
      - uv run python demolab-engine/build/build.py

  dev:
    desc: "Serve the Typst site with hot-reload (port 3000; override: task dev -- 3010)"
    cmds:
      - uv run python demolab-engine/build/build.py --generate-only
      - >-
        typst watch --format bundle --features bundle,html --root .
        demolab-engine/build/main.typ artifacts/site/ --port {{.CLI_ARGS | default "3000"}}

  run:
    desc: "Run a demolab experiment end-to-end — e.g. task run -- exp000"
    cmds:
      - uv run python experiments/{{.CLI_ARGS}}.py

  # ── Housekeeping ────────────────────────────────────────────────────────
  clean:
    desc: Remove Python caches (__pycache__, .pytest_cache) — leaves artifacts
    cmds:
      - find src -type d -name __pycache__ -prune -exec rm -rf {} +
      - rm -rf .pytest_cache src/cli/.pytest_cache
