# https://taskfile.dev

version: "3"

silent: true

tasks:
  default:
    desc: Show all tasks
    cmds:
      - task --list-all

  install:
    desc: Install all dependencies (python + js)
    cmds:
      - uv sync
      - cd src/vite && bun install

  dev:
    desc: Run typst watch and vite dev in parallel
    deps:
      - typst:watch
      - vite:dev

  test:
    desc: Run core library tests
    cmds:
      - uv run pytest -q src/pinglab/src/pinglab

  new:
    desc: Interactively scaffold a new study (post + study files)
    cmds:
      - uv run python src/scripts/scaffold_experiment.py

  list:
    desc: List available studies
    cmds:
      - uv run python src/scripts/list_experiments.py

  delete:
    desc: Interactively delete a study and its paired post
    cmds:
      - uv run python src/scripts/delete_experiment.py

  rename:
    desc: Interactively rename a study and update related paths/references
    cmds:
      - uv run python src/scripts/rename_experiment.py

  fork:
    desc: Interactively fork an existing study into a new named study
    cmds:
      - uv run python src/scripts/fork_experiment.py

  run:
    desc: Run a study by selector (e.g. task run -- study.1)
    cmds:
      - uv run python src/scripts/run_experiment.py {{.CLI_ARGS}}

  plot:
    desc: Regenerate plots from saved run data (e.g. task plot -- study.16 [run_id])
    cmds:
      - uv run python src/scripts/plot_experiment.py {{.CLI_ARGS}}

  run:modal:
    desc: Run a study on Modal GPU (e.g. task run:modal -- study.15)
    cmds:
      - |
        set -euo pipefail
        selector="{{.CLI_ARGS}}"
        if [ -d "src/experiments/${selector}" ]; then
          study="${selector}"
        else
          matches=(src/experiments/${selector}-*/)
          if [ ${#matches[@]} -eq 1 ] && [ -d "${matches[0]}" ]; then
            study="$(basename "${matches[0]}")"
          elif [ ${#matches[@]} -gt 1 ]; then
            echo "Ambiguous selector '${selector}'. Matches:" >&2
            printf '  %s\n' "${matches[@]}" >&2
            exit 1
          else
            echo "No study matching '${selector}'." >&2
            exit 1
          fi
        fi
        echo "Running ${study} on Modal..."
        PINGLAB_STUDY="${study}" uv run modal run src/scripts/modal_run.py --study "${study}"

  run:modal:detach:
    desc: Run a study on Modal GPU in detached mode (survives laptop close). e.g. task run:modal:detach -- study.15
    cmds:
      - |
        set -euo pipefail
        selector="{{.CLI_ARGS}}"
        if [ -d "src/experiments/${selector}" ]; then
          study="${selector}"
        else
          matches=(src/experiments/${selector}-*/)
          if [ ${#matches[@]} -eq 1 ] && [ -d "${matches[0]}" ]; then
            study="$(basename "${matches[0]}")"
          elif [ ${#matches[@]} -gt 1 ]; then
            echo "Ambiguous selector '${selector}'. Matches:" >&2
            printf '  %s\n' "${matches[@]}" >&2
            exit 1
          else
            echo "No study matching '${selector}'." >&2
            exit 1
          fi
        fi
        echo "Running ${study} on Modal (detached)..."
        PINGLAB_STUDY="${study}" uv run modal run --detach src/scripts/modal_run.py --study "${study}"

  modal:logs:
    desc: Tail logs from the latest Modal study run (e.g. task modal:logs)
    cmds:
      - |
        set -euo pipefail
        app_id=$(uv run modal app list --json 2>/dev/null | uv run python -c "
        import json, sys
        apps = json.load(sys.stdin)
        for app in apps:
            if app.get('Description') == 'pinglab-study':
                print(app['App ID'])
                sys.exit(0)
        print('pinglab-study', file=sys.stderr)
        sys.exit(1)
        ")
        echo "Tailing logs for ${app_id}..."
        uv run modal app logs "${app_id}"

  modal:download:
    desc: Download artifacts from Modal volume (e.g. task modal:download -- study.14)
    cmds:
      - uv run python src/scripts/download_artifacts.py {{.CLI_ARGS}}

  validate:
    desc: Validate a graph config.json path (e.g. task validate -- src/experiments/study.1-rhythmicity-index/config.json)
    cmds:
      - uv run --package pinglab python src/pinglab/src/pinglab/io/compiler.py {{.CLI_ARGS}}

  typst:compile:
    desc: Compile all .typ files to PDF (output to src/vite/public/)
    cmds:
      - |
        set -euo pipefail
        mkdir -p src/vite/public
        count=0
        fails=0
        for f in src/typst/*.typ; do
          name="$(basename "$f" .typ)"
          out="src/vite/public/${name}.pdf"
          printf "Compiling %-50s" "$name"
          if [ "$name" = "report.1-ping-bptt" ]; then
            root="src"
          else
            root="src/typst"
          fi
          if uv run typst compile "$f" "$out" --root "$root" 2>/tmp/typst-err-$$; then
            echo "✓"
            count=$((count + 1))
          else
            echo "✗"
            cat /tmp/typst-err-$$ | head -5
            fails=$((fails + 1))
          fi
        done
        echo ""
        echo "Done: ${count} compiled, ${fails} failed."
        rm -f /tmp/typst-err-$$
        [ "$fails" -eq 0 ]

  typst:watch:
    desc: Watch and recompile .typ files on change (output to src/vite/public/)
    cmds:
      - |
        set -euo pipefail
        mkdir -p src/vite/public
        for f in src/typst/*.typ; do
          name="$(basename "$f" .typ)"
          out="src/vite/public/${name}.pdf"
          if [ "$name" = "report.1-ping-bptt" ]; then
            root="src"
          else
            root="src/typst"
          fi
          uv run typst watch "$f" "$out" --root "$root" &
        done
        echo "Watching $(ls src/typst/*.typ | wc -l | tr -d ' ') .typ files for changes..."
        # Generate manifest initially, then watch for .typ changes
        uv run python src/scripts/generate_manifest.py
        while true; do
          if find src/typst -name '*.typ' -newer src/vite/public/manifest.json 2>/dev/null | grep -q .; then
            uv run python src/scripts/generate_manifest.py
          fi
          sleep 3
        done &
        wait

  typst:publish:
    desc: Compile .typ files and generate manifest.json from Typst metadata
    cmds:
      - task typst:compile
      - uv run python src/scripts/generate_manifest.py

  vite:dev:
    desc: Run Vite dev server
    cmds:
      - cd src/vite && bun run dev

  vite:build:
    desc: Build Vite for production
    cmds:
      - cd src/vite && bun run build
