# Taskfile for pinglab — https://taskfile.dev  (run `task` to list everything)
#
# Stack: Python via uv (tools/snn = engine, experiments/ = runners); publishing
# via Typst (writings/ + artifacts/, built by the demolab-cli engine). See `task build`/`dev`.
# House rule: everything here runs LOCAL. No task dispatches Modal — that
# spends real money, so it stays an explicit opt-in via a runner's own
# --modal-gpu flag (e.g. `task run -- nb022 --modal-gpu A100`), never a task.

version: "3"
silent: true

vars:
  CLI: uv run python tools/snn/tool.py

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # ── Setup ───────────────────────────────────────────────────────────────
  install:
    desc: Install all dependencies (Python via uv)
    cmds:
      - uv sync --dev

  # ── Quality gate (mirrors .github/workflows/lint.yml) ───────────────────
  lint:
    desc: Ruff lint over tools/snn + experiments
    cmds:
      - uv run ruff check {{.CLI_ARGS}}

  fmt:
    desc: Format Python with ruff
    cmds:
      - uv run ruff format {{.CLI_ARGS}}

  typecheck:
    desc: Type-check with ty
    cmds:
      - uv run ty check

  nb-gate:
    desc: Enforce the experiment→tool boundary (no `import tools`/`models` — subprocess only)
    cmds:
      - uv run ruff check experiments --select TID

  check:
    desc: Full quality gate — lint + typecheck + experiment boundary (what CI runs)
    cmds:
      - task: lint
      - task: typecheck
      - task: nb-gate

  # ── Tests (mirrors .github/workflows/test.yml) ──────────────────────────
  test:
    desc: "Pick a scope — use `task test:fast` or `task test:all`"
    cmds:
      - |
        echo "\`task test\` is split by scope — pick one:"
        echo "  task test:fast   (~50s)    lint + typecheck + unit/coverage tests"
        echo "  task test:all    (~3-5m)   lint + typecheck + the full suite incl @slow"
        echo ""
        echo "Both take pass-through args, e.g.  task test:fast -- -k rhythm"

  test:fast:
    desc: Lint + typecheck + the quick tests (skips the two heavy integration files) — ~50s
    cmds:
      # Blank CLI_ARGS for the checks so `task test:fast -- -k foo` reaches pytest only.
      - task: lint
        vars: { CLI_ARGS: "" }
      - task: typecheck
      - >-
        uv run pytest tools/snn/tests experiments/tests -m "not slow"
        --ignore=tools/snn/tests/test_train_integration.py
        --ignore=tools/snn/tests/test_infer_integration.py
        {{.CLI_ARGS}}

  test:all:
    desc: Lint + typecheck + the FULL suite incl @slow end-to-end tests — ~3-5m
    cmds:
      - task: lint
        vars: { CLI_ARGS: "" }
      - task: typecheck
      - uv run pytest tools/snn/tests experiments/tests {{.CLI_ARGS}}

  test:cov:
    desc: Tests with the coverage report (mirrors CI)
    cmds:
      - uv run pytest tools/snn/tests experiments/tests --cov --cov-report=term-missing

  # ── CLI (pinglab-cli) ───────────────────────────────────────────────────
  sim:
    desc: "Run a simulation — e.g. task sim -- --t-ms 300 --input-rate 25"
    cmds:
      - "{{.CLI}} sim {{.CLI_ARGS}}"

  train:
    desc: "Train a model — e.g. task train -- --epochs 3 --max-samples 1000"
    cmds:
      - "{{.CLI}} train {{.CLI_ARGS}}"

  cli:
    desc: "Run the CLI with arbitrary args — e.g. task cli -- --help"
    cmds:
      - "{{.CLI}} {{.CLI_ARGS}}"

  # ── Publishing (Typst via the demolab-cli package) ──────────────────────
  # `task build` / `task dev` drive the Typst engine over writings/ + artifacts/;
  # `task run` runs a demolab experiment. The engine lives in the demolab-cli
  # dependency (uv sync installs the `demolab` command); no vendored engine dir.
  build:
    desc: "Build the Typst bundle → artifacts/site/ (web) + artifacts/pdfs/ (PDFs + book)"
    cmds:
      - uv run demolab build

  dev:
    desc: "🔥 Serve the site with hot-reload + in-browser build errors (auto-picks a free port from 3000; override: task dev -- 3010)"
    cmds:
      # demolab's dev server rebuilds on any source change and serves artifacts/site/
      # with live-reload. Unlike `typst watch` it re-globs each build (so new entries +
      # decks appear without a restart) and surfaces a failed compile as a full-screen
      # overlay in the browser instead of only the terminal.
      - uv run demolab dev {{.CLI_ARGS}}

  run:
    desc: "Run a demolab experiment end-to-end — e.g. task run -- nb047"
    cmds:
      - uv run python experiments/{{.CLI_ARGS}}.py

  # ── Housekeeping ────────────────────────────────────────────────────────
  clean:
    desc: Remove Python caches (__pycache__, .pytest_cache) — leaves artifacts
    cmds:
      - find tools experiments -type d -name __pycache__ -prune -exec rm -rf {} +
      - rm -rf .pytest_cache tools/snn/.pytest_cache
