# Opt-in Pages workflow — per-PR previews. Copied alongside deploy.yml by `demolab deploy-setup`.
# Every pull request gets its own built copy of the site under pr-preview/pr-<N>/ on the
# gh-pages branch, a sticky comment on the PR linking to it, and an automatic teardown when the
# PR closes or merges. This is what makes a night-shift PR readable — the whole doc set (plan,
# log, writeups, PDFs) renders at a URL instead of a raw diff. See AUTORESEARCH-RULES §5.
#
# Requires deploy.yml's branch-based flow (both write gh-pages) and the same one-time settings
# change: Settings → Pages → Source: "Deploy from a branch" → `gh-pages` / `(root)`.
#
# Fork PRs get a read-only token and cannot write gh-pages, so previews are skipped for external
# contributors — expected, and fine for a personal lab. Do NOT switch this to pull_request_target
# to "fix" that: it runs untrusted PR code with a write token (privilege-escalation footgun).
name: Deploy PR preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# Previews commit into gh-pages; the sticky comment needs PR write.
permissions:
  contents: write
  pull-requests: write

# One in-flight run per PR: rapid pushes to a branch supersede rather than race commits to gh-pages.
concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # On a 'closed' event we skip the build and only run the teardown (the action's `remove`
      # auto-mode does this), so guard the build steps to non-closed events.
      - uses: typst-community/setup-typst@v4
        if: github.event.action != 'closed'

      - uses: astral-sh/setup-uv@v5
        if: github.event.action != 'closed'

      - name: Build the site bundle
        if: github.event.action != 'closed'
        run: |
          uv sync
          uv run demolab build

      # Deploys artifacts/site to gh-pages under pr-preview/pr-<N>/ (opened/synchronize/reopened),
      # maintains the sticky PR comment, and removes that subdir on 'closed'. auto-detects the
      # action from the event type.
      - name: Deploy / update / tear down the preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: artifacts/site
          # umbrella dir defaults to pr-preview/ — matches deploy.yml's clean-exclude.
