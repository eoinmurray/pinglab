# Opt-in Pages workflow — production deploy. demolab ships with NO active deploy workflow;
# `demolab deploy-setup` (or the getting-started runbook) copies this file plus preview.yml
# into .github/workflows/ once the user chooses to publish. Both are engine templates —
# rerun `demolab deploy-setup` after an engine update to refresh them.
#
# This uses the BRANCH-based Pages flow (build → commit the site to the `gh-pages` branch),
# not the GitHub-Actions Pages flow, so that per-PR previews (preview.yml) can live in the same
# branch under pr-preview/. That means a one-time settings change:
#     Settings → Pages → Source: "Deploy from a branch" → branch `gh-pages` / `(root)`
# A lab still on the old "GitHub Actions" source keeps deploying until you flip this; see
# `demolab docs CHANGELOG` for the migration note.
name: Build the Typst bundle and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# The deploy commits the built site to the gh-pages branch, so the token needs write.
permissions:
  contents: write

# Serialise production deploys against each other and against preview teardowns, so two
# writers never race a commit to gh-pages. Preview builds use their own per-PR group.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Typst CLI compiles the bundle (--features bundle,html). Typst ships the
      # New Computer Modern fonts the writings use, so no font install is needed.
      - uses: typst-community/setup-typst@v4

      # The engine ships in the demolab-cli package (a dependency of this lab), so the build
      # needs the venv. The engine itself is pure stdlib — uv sync is what installs it.
      - uses: astral-sh/setup-uv@v5

      - name: Build the site bundle
        run: |
          uv sync
          uv run demolab build

      # Publish artifacts/site to the root of the gh-pages branch. `clean: true` prunes stale
      # files, but clean-exclude PRESERVES:
      #   - pr-preview/  — live PR previews (preview.yml owns these; a prod deploy must not wipe them)
      #   - CNAME        — the custom-domain marker GitHub writes when you set a Pages domain
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: artifacts/site
          branch: gh-pages
          clean: true
          clean-exclude: |
            pr-preview/
            CNAME
          single-commit: true   # keep gh-pages a single snapshot commit, not an ever-growing history
