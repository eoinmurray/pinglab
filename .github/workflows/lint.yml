name: Lint & Type Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --dev

      # Blocking: the tree is clean (ruff + ty both pass repo-wide). These steps
      # now fail CI on any new finding.
      - name: Ruff
        id: ruff
        run: uv run ruff check --output-format=github

      - name: ty
        id: ty
        run: uv run ty check

      # The invariant: experiment runners reach the engine only by running the
      # snn tool as a subprocess (python tools/snn/tool.py ...), never by importing
      # the `tools` package or the `models` torch engine (enforced by
      # experiments/ruff.toml TID251). A HARD, zero-exception gate — CI fails if any
      # runner introduces a direct import (bare, submodule, or `from … import` form).
      # Do not add continue-on-error or per-file-ignores: the boundary is
      # non-negotiable. If a runner needs something, grow a generic tool subcommand.
      - name: Experiment tool-import gate
        id: nb_gate
        run: uv run ruff check experiments --select TID --output-format=github
