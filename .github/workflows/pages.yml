name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Compile Typst to PDF
        run: |
          set -euo pipefail
          mkdir -p src/vite/public
          for f in src/typst/*.typ; do
            name="$(basename "$f" .typ)"
            out="src/vite/public/${name}.pdf"
            typst compile "$f" "$out" --root "src/typst"
          done

      - name: Generate PDF manifest
        run: python src/scripts/generate_manifest.py

      - name: Install Vite deps
        run: bun install --frozen-lockfile
        working-directory: src/vite

      - name: Build Vite site
        run: bun run build
        working-directory: src/vite

      - name: Add CNAME
        run: echo "pl.eoinmurray.info" > src/vite/dist/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/vite/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
