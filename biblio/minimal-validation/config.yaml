
experiment_1:
  I_E: 1.2  # Fixed input to E neurons
  # g_ei
  linspace:
    start: 1.2
    stop: 1.7
    num: 10

experiment_2:
  g_ei: 1.4  # Fixed E→I synaptic weight
  # I_E
  linspace:
    start: 1.15
    stop: 1.25
    num: 10

experiment_3:
  g_ei: 1.4
  # I_E
  linspace_large:
    start: 0.0
    stop: 100.0
    num: 40
  linspace_small:
    start: 0.0
    stop: 2.0
    num: 40

experiment_4:
  g_ei: 1.4
  # I_E
  linspace:
    start: 0.5
    stop: 2.0
    num: 40

experiment_5:
  g_ei: 1.4
  I_E: 1.5

experiment_6:
  g_ei: 1.4
  linspace:
    start: 0.5
    stop: 2.0
    num: 40

default_inputs:
  I_I: 0.9       # Input to I neurons (slightly lower)
  noise: 0.6  # Strong noise (0.5-1.0 range) creates irregularity and breaks synchrony

plotting:
  raster:
    start_time: 500.0  # ms
    stop_time: 1000.0  # ms

base:
  dt: 0.1        # Time step for numerical integration (ms)
  T: 1000.0      # Total simulation time (ms)
  seed: 0        # Random seed for reproducibility

  # Network topology: Canonical PING (Pyramidal Interneuron Network Gamma)
  N_E: 800       # Excitatory neurons (4:1 ratio standard)
  N_I: 200       # Inhibitory neurons

  # Synaptic weights: Balanced E-I for asynchronous regime
  g_ei: 1.4      # E→I (moderate excitation to interneurons)
  g_ie: 2.1      # I→E (strong inhibitory feedback to suppress synchrony)
  g_ee: 0.3      # E→E (weak recurrent excitation)
  g_ii: 0.3      # I→I (weak recurrent inhibition)

  # Connection probabilities: Moderately sparse (not too sparse)
  p_ee: 0.04      # Moderate E→E connections
  p_ei: 0.12      # Moderate E→I connections
  p_ie: 0.04      # Moderate I→E connections
  p_ii: 0.04      # Moderate I→I connections

  # Synaptic delays
  delay_ei: 0.5  # E→I delay (ms)
  delay_ie: 1.2  # I→E delay (ms)
  delay_ee: 0.5
  delay_ii: 0.5

  # LIF neuron parameters
  V_init: -65.0  # Initial membrane potential (mV)
  E_L: -65.0     # Leak reversal potential (mV)
  E_e: 0.0       # Excitatory synaptic reversal (mV)
  E_i: -80.0     # Inhibitory synaptic reversal (mV)
  C_m_E: 1.0     # Membrane capacitance (E)
  g_L_E: 0.05    # Leak conductance (E)
  C_m_I: 1.0     # Membrane capacitance (I)
  g_L_I: 0.1     # Leak conductance (I)
  V_th: -50.0    # Spike threshold (mV)
  V_reset: -65.0 # Reset potential (mV)
  t_ref_E: 3.0   # Refractory period for E neurons (ms)
  t_ref_I: 1.5   # Refractory period for I neurons (ms)

  # Synaptic time constants: Critical for PING oscillation timing
  tau_ampa: 2.0  # AMPA (excitatory) - fast, ~2ms
  tau_gaba: 6.5  # GABA (inhibitory) - slower, ~6.5ms

  # Connectivity scaling
  connectivity_scaling: "one_over_N_src"

  # Heterogeneity parameters: Add heterogeneity for more irregularity
  V_th_heterogeneity_sd: 1.5   # Threshold variability (±1.5 mV)
  g_L_heterogeneity_sd: 0.15   # Leak conductance variability (15%)
  C_m_heterogeneity_sd: 0.10    # Capacitance variability (10%)
  t_ref_heterogeneity_sd: 0.3  # Refractory period variability (±0.3 ms)
