plotting:
  raster:
    start_time: 0.0
    stop_time: 1000.0

default_inputs:
  I_E: 1.0
  I_I: 0.8
  noise: 0.0

weights:
  mean_ee: 0.3
  mean_ei: 1.5
  mean_ie: 2.5
  mean_ii: 0.3
  std_ee: 0.0
  std_ei: 0.0
  std_ie: 0.0
  std_ii: 0.0
  p_ee: 0.04
  p_ei: 0.12
  p_ie: 0.04
  p_ii: 0.04
  clamp_min: 0.0

sweep:
  I_E:
    start: 0.6
    stop: 1.5
    num: 50
  bin_ms: 5.0
  burn_in_ms: 200.0
  tau_min_ms: 5.0
  tau_max_ms: 200.0

models:
  - name: lif
    neuron_model: lif
    sweep:
      I_E:
        start: 0.6
        stop: 1.5
        num: 50
      bin_ms: 5.0
      burn_in_ms: 200.0
      tau_min_ms: 5.0
      tau_max_ms: 200.0
  - name: hh
    neuron_model: hh
    input_scale_E: 5.0
    input_scale_I: 5.0
    overrides:
      E_L: -54.4
      g_L_E: 0.3
      g_L_I: 0.3
    sweep:
      I_E:
        start: 0.6
        stop: 1.5
        num: 50
      bin_ms: 5.0
      burn_in_ms: 200.0
      tau_min_ms: 5.0
      tau_max_ms: 200.0
  - name: qif
    neuron_model: qif
    input_scale_E: 1.5
    input_scale_I: 3.0
    overrides:
      qif_a: 0.02
      qif_Vr: -60.0
      qif_Vt: -45.0
      V_th: -40.0
    sweep:
      I_E:
        start: 0.6
        stop: 1.5
        num: 50
      bin_ms: 5.0
      burn_in_ms: 200.0
      tau_min_ms: 5.0
      tau_max_ms: 200.0
  - name: mqif
    neuron_model: mqif
    input_scale_E: 1.0
    overrides:
      mqif_a: [0.11]
      mqif_Vr: [-55.0]
      V_th: -40.0
      g_L_E: 0.08
      g_L_I: 0.08
      t_ref_E: 1.5
    sweep:
      I_E:
        start: 0.6
        stop: 1.5
        num: 50
      bin_ms: 5.0
      burn_in_ms: 200.0
      tau_min_ms: 5.0
      tau_max_ms: 200.0

base:
  dt: 0.1
  T: 1000.0
  seed: 0

  N_E: 800
  N_I: 200


  delay_ei: 0.5
  delay_ie: 1.2
  delay_ee: 0.5
  delay_ii: 0.5

  V_init: -65.0
  E_L: -65.0
  E_e: 0.0
  E_i: -80.0
  C_m_E: 1.0
  g_L_E: 0.05
  C_m_I: 1.0
  g_L_I: 0.1
  V_th: -50.0
  V_reset: -65.0
  t_ref_E: 3.0
  t_ref_I: 1.5

  g_Na: 120.0
  g_K: 36.0
  E_Na: 50.0
  E_K: -77.0

  tau_ampa: 2.0
  tau_gaba: 6.5

  V_th_heterogeneity_sd: 0.15
  g_L_heterogeneity_sd: 0.05
  C_m_heterogeneity_sd: 0.05
  t_ref_heterogeneity_sd: 0.1
