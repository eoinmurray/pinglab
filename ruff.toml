# Ruff configuration for pinglab.
# Python lives in src/cli, src/notebooks, and the demolab layer (tools/,
# experiments/).

target-version = "py310"
line-length = 88

extend-exclude = [
    "src/artifacts",
    "src/papers",
    ".venv",
    # demolab-engine is a vendored black box (re-pulled from upstream, never
    # edited here) — we don't own its lint, so a future upstream pull can't
    # break our gate. artifacts/ and temp/ are generated output, not source.
    "demolab-engine",
    "artifacts",
    "temp",
]

[lint]
# Lean set: pyflakes (real bugs), pycodestyle errors, and import sorting.
select = ["E", "F", "I"]
# Two pycodestyle rules are noise for this codebase, so they are ignored while
# pyflakes (F*) stays strict — it catches real dead code and bugs:
#   E501 (line too long) — code wrapping is `ruff format`'s job; the remaining
#         long lines are help-text strings and comment tables that don't wrap.
#   E741 (ambiguous name l/I/O) — `I` is inhibitory and `E` excitatory here;
#         the single-letter E/I vocabulary is deliberate, not ambiguous.
ignore = ["E501", "E741"]

[lint.per-file-ignores]
# Notebook + experiment runners must set sys.path / REPO before importing local
# modules (helpers live in the un-migrated src/notebooks tree), so module-level
# imports legitimately follow setup code.
"src/notebooks/*" = ["E402"]
"experiments/*" = ["E402"]

[format]
quote-style = "double"
indent-style = "space"
